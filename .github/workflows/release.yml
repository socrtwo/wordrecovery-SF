name: Release (multi-platform)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v3.1.0)'
        required: true

permissions:
  contents: write

jobs:
  web:
    name: Web (PWA zip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package web/
        run: |
          set -e
          cd web && zip -r ../wordrecovery-web.zip . && cd ..
          ls -la wordrecovery-web.zip
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          files: wordrecovery-web.zip
          fail_on_unmatched_files: false

  desktop:
    name: Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || inputs.tag }}
          releaseName: ${{ github.ref_name || inputs.tag }}
          releaseDraft: false
          prerelease: false
          projectPath: src-tauri
          args: ''

  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Capacitor sync + build
        working-directory: mobile
        run: |
          set -e
          npm install --no-audit --no-fund
          npx cap add android
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease || ./gradlew assembleDebug
          find app/build/outputs -name '*.apk' -type f
      - name: Stage APK
        run: |
          set -e
          mkdir -p _out
          find mobile/android/app/build/outputs -name '*.apk' -type f -exec cp {} _out/ \;
          ls -la _out/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          files: _out/*.apk
          fail_on_unmatched_files: false

  ios:
    name: iOS (unsigned IPA)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Capacitor sync + archive
        working-directory: mobile
        run: |
          set -e
          npm install --no-audit --no-fund
          npx cap add ios
          npx cap sync ios
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO archive
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -r WordRecovery-unsigned.ipa Payload
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          files: mobile/ios/App/build/WordRecovery-unsigned.ipa
          fail_on_unmatched_files: false
